name: SmartShop - Production Quality Gate & Canary Deploy

on:
  push:
    branches: [main]

jobs:
  quality-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read # Regra de Boa prática 5: Acesso mínimo de leitura de código
      issues: write # Regra de Boa prática 5: Permissão para abrir alertas automatizados

    steps:
      - name: Checkout Código do Repositório
        uses: actions/checkout@v4

      - name: Configurar Python para Testes e IA
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # Ativa o cache nativo para o ecossistema Python

      - name: Instalar Dependências (Pip)
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov groq

      - name: Executar Suite de Testes e Cobertura (Pytest)
        # Regra de Boa Prática 3: Executa os testes gerando o relatório de cobertura que o deploy_gate.py espera
        run: pytest --cov=src --cov-report=json:coverage/coverage-summary.json
        # Apontando apenas para o teste bom para simular aprovação total do Quality Gate
        # run: pytest tests/test_app_good.py --cov=src --cov-report=json:coverage/coverage-summary.json

      - name: Validar Portão de Entrada (Deploy Gate IA)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python deploy/deploy_gate.py

      - name: Simular Implantação Progressiva (Canary Deploy 10% -> 50% -> 100%)
        if: success()
        run: python deploy/canary_simulator.py

      - name: Tratar Falhas e Disparar Rollback Automático com IA
        if: failure()
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Necessário para o gh CLI autenticar
        run: |
          pip install groq
          python deploy/rollback_trigger.py
