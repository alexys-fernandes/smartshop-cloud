name: SmartShop - Agente de Testes Autônomo

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  intelligent-agent-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov groq

      - name: Executar Bateria de Testes
        run: |
          pytest --cov=src tests/ > coverage.txt || true

      - name: Agente de Testes - Gerar Relatório Executivo
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python src/intelligent_agent.py

      - name: Carregar Relatório Técnico como Artefato da Pipeline
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-executivo-agente
          path: docs/relatorio_agente.md
