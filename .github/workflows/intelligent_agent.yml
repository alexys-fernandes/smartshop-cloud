name: SmartShop - Agente de Testes Autônomo

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  intelligent-agent-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov groq

      - name: Executar Bateria de Testes
        run: |
          pytest --cov=src tests/ > coverage.txt || true

      - name: Agente de Testes - Gerar Relatório Executivo
        env:
          GROQCLOUD_API_KEY: ${{ secrets.GROQCLOUD_API_KEY }}
        run: |
          python -c "
          import os, sys, json
          from groq import Groq

          client = Groq(api_key=os.environ.get('GROQCLOUD_API_KEY'))
          with open('coverage.txt', 'r') as f:
              cov_data = f.read()
              
          prompt = f'''
          Você é o Agente de Testes da SmartShop Cloud. Sua função é avaliar a cobertura e gerar relatórios.
          Com base neste relatório de cobertura:
          {{cov_data}}

          Gere um relatório executivo formatado em Markdown para os desenvolvedores contendo:
          1. Resumo da cobertura atual.
          2. Avaliação de risco.
          3. Sugestão de melhoria ou parabenização caso esteja acima de 80%.
          '''

          completion = client.chat.completions.create(
              model='llama3-8b-8192',
              messages=[{{'role': 'user', 'content': prompt}}],
              temperature=0.2
          )

          with open('relatorio_agente.md', 'w') as out:
              out.write(completion.choices[0].message.content)
          print('Relatório gerado com sucesso!')
          "

      - name: Carregar Relatório como Artefato do Pipeline
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-executivo-agente
          path: relatorio_agente.md
